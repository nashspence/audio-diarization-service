services:
  diarizen:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DIARIZEN_REF: ${DIARIZEN_REF}
    container_name: ${COMPOSE_PROJECT_NAME}-api
    env_file:
      - .env
    environment:
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HF_HOME}
      TRANSFORMERS_CACHE: ${HF_HOME}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES}
    ports:
      - "${HOST_PORT}:8000"
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 10m
    restart: unless-stopped
    stop_grace_period: 2m
    volumes:
      - ${MODEL_CACHE_HOST_DIR:-./.cache/models/huggingface}:${HF_HOME}
